name: Build

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    name: build (${{ matrix.build }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        build:
          - linux-aarch64
          - linux-x86_64
          - linux-i686
          - macos-aarch64
          - macos-x86_64 # deprecated
          - windows-x86_64
          - windows-i686
          - windows-aarch64
        include:
          - build: linux-aarch64
            os: ubuntu-latest
            target: aarch64-unknown-linux-musl
            use-cross: true
          - build: linux-x86_64
            os: ubuntu-latest
            target: x86_64-unknown-linux-musl
            use-cross: true
          - build: linux-i686
            os: ubuntu-latest
            target: i686-unknown-linux-musl
            use-cross: true
          - build: macos-aarch64
            os: macos-14
            target: aarch64-apple-darwin
            use-cross: false
          - build: macos-x86_64
            os: macos-14
            target: x86_64-apple-darwin
            use-cross: false
          - build: windows-x86_64
            os: windows-2022
            target: x86_64-pc-windows-msvc
            use-cross: false
          - build: windows-i686
            os: windows-2022
            target: i686-pc-windows-msvc
            use-cross: false
          - build: windows-aarch64
            os: windows-2022
            target: aarch64-pc-windows-msvc
            use-cross: false

    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Install Rust stable
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Rust Cache
        uses: swatinem/rust-cache@v2
        with:
          key: ${{ matrix.target }}

      - name: Install NASM
        if: startsWith(matrix.build, 'windows-')
        uses: ilammy/setup-nasm@v1

      - name: Install Cross
        if: matrix.use-cross
        uses: taiki-e/install-action@cross

      - name: Build binary
        shell: bash
        run: |
          if [ "${{ matrix.use-cross }}" == "true" ]; then
            cross build --verbose --release --target ${{ matrix.target }}
          else
            cargo build --verbose --release --target ${{ matrix.target }}
          fi
        env:
          RUST_BACKTRACE: 1

      - name: Prepare Binary
        shell: bash
        run: |
          BIN_NAME="fd"
          if [[ "${{ matrix.build }}" == windows-* ]]; then
            EXE_NAME="${BIN_NAME}.exe"
            NEW_NAME="${BIN_NAME}-${{ matrix.build }}.exe"
          else
            EXE_NAME="${BIN_NAME}"
            NEW_NAME="${BIN_NAME}-${{ matrix.build }}"
          fi

          mkdir -p ./artifacts/
          cp "target/${{ matrix.target }}/release/${EXE_NAME}" "./artifacts/${NEW_NAME}"
          echo "ASSET_PATH=./artifacts/${NEW_NAME}" >> $GITHUB_ENV

      - name: Upload artifact
        uses: actions/upload-artifact@v7
        with:
          name: ${{ matrix.build }}
          path: ${{ env.ASSET_PATH }}
          retention-days: 1

  release:
    name: Create Release
    needs: build
    if: startsWith(github.ref, 'refs/tags/')
    runs-on: ubuntu-latest
    steps:
      - name: Download all artifacts
        uses: actions/download-artifact@v7
        with:
          path: ./all-artifacts
          merge-multiple: true

      - name: Release
        uses: softprops/action-gh-release@v2
        with:
          files: ./all-artifacts/*
          generate_release_notes: true
